<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Distributor Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f1117; color: #e0e0e0; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: #151820; border-bottom: 1px solid #2a2d3a; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #f5a623; letter-spacing: 2px; }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .live { background: #1a3a2a; color: #4caf50; }
    .updated { background: #2a2d3a; color: #aaa; font-size: 12px; padding: 4px 12px; border-radius: 20px; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 12px 24px; background: #151820; border-bottom: 1px solid #2a2d3a; }
    .toolbar label { font-size: 12px; color: #aaa; font-weight: 600; letter-spacing: 1px; }
    select { background: #1e2130; border: 1px solid #2a2d3a; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .nav-btn { background: #2a2d3a; border: none; color: #fff; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    .nav-btn:hover { background: #f5a623; color: #000; }
    .content { padding: 24px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #151820; border-radius: 12px; padding: 16px 20px; border-top: 3px solid; }
    .card.orange { border-color: #f5a623; }
    .card.green  { border-color: #4caf50; }
    .card.purple { border-color: #9c27b0; }
    .card.blue   { border-color: #2196f3; }
    .card.red    { border-color: #f44336; }
    .card .label { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .card .value { font-size: 32px; font-family: 'Bebas Neue', sans-serif; color: #fff; }
    .card .sub   { font-size: 11px; color: #666; margin-top: 4px; }
    .section { background: #151820; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .section h2 { font-size: 13px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; color: #666; text-align: left; padding: 8px 12px; border-bottom: 1px solid #2a2d3a; text-transform: uppercase; }
    td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid #1e2130; }
    tr:hover td { background: #1e2130; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar { height: 6px; border-radius: 3px; background: #f5a623; }
    .bar-bg { flex: 1; height: 6px; border-radius: 3px; background: #2a2d3a; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .tag.green { background: #1a3a2a; color: #4caf50; }
    .tag.red   { background: #3a1a1a; color: #f44336; }
    .chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-top: 8px; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .bar-col .b { width: 100%; background: #f5a623; border-radius: 3px 3px 0 0; min-height: 2px; }
    .bar-col .m { font-size: 9px; color: #666; margin-top: 4px; transform: rotate(-45deg); white-space: nowrap; }
    .loading { text-align: center; padding: 60px; color: #666; }
    .error { text-align: center; padding: 40px; color: #f44336; background: #3a1a1a; border-radius: 12px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:768px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <h1>DISTRIBUTOR ANALYTICS <span style="font-size:14px;color:#666;font-family:Inter">PERFORMANCE DASHBOARD</span></h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span class="badge live">● Live — Auto Refresh</span>
    <span class="updated" id="last-updated">Connecting...</span>
  </div>
</header>

<div class="toolbar">
  <label>DISTRIBUTOR</label>
  <select id="dist-select"></select>
  <button class="nav-btn" onclick="navigate(-1)">‹</button>
  <button class="nav-btn" onclick="navigate(1)">›</button>
</div>

<div class="content" id="content">
  <div class="loading">Connecting to database...</div>
</div>

<script>
  let allData = null;
  let distributors = [];
  let currentIndex = 0;

  async function fetchData() {
    try {
      const res = await fetch('/metrics');
      if (!res.ok) throw new Error('API error ' + res.status);
      allData = await res.json();
      distributors = allData.metrics.map(m => m.business_name);

      const sel = document.getElementById('dist-select');
      sel.innerHTML = distributors.map((d,i) => `<option value="${i}">${d}</option>`).join('');
      sel.onchange = () => { currentIndex = parseInt(sel.value); render(); };

      document.getElementById('last-updated').textContent =
        'Last updated: ' + new Date(allData.lastUpdated).toLocaleTimeString();

      render();
    } catch(e) {
      document.getElementById('content').innerHTML =
        `<div class="error"><b>Could not connect to database</b><br>${e.message}</div>`;
    }
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + distributors.length) % distributors.length;
    document.getElementById('dist-select').value = currentIndex;
    render();
  }

  function fmt(n) { return parseInt(n).toLocaleString('en-IN'); }
  function pct(n) { return parseFloat(n).toFixed(1) + '%'; }

  function render() {
    if (!allData) return;
    const m = allData.metrics[currentIndex];
    const monthly = allData.monthly.filter(r => r.business_name === m.business_name);
    const products = allData.top_products.filter(r => r.business_name === m.business_name).slice(0, 10);

    const maxOrders = Math.max(...monthly.map(r => parseInt(r.orders)), 1);

    document.getElementById('content').innerHTML = `
      <div class="cards">
        <div class="card orange">
          <div class="label">Total Orders</div>
          <div class="value">${fmt(m.total_orders)}</div>
          <div class="sub">${m.state} · ${m.city}</div>
        </div>
        <div class="card green">
          <div class="label">Paid Orders</div>
          <div class="value">${fmt(m.paid_orders)}</div>
          <div class="sub">Payment Rate: ${pct(m.payment_rate)}</div>
        </div>
        <div class="card purple">
          <div class="label">Fulfilled</div>
          <div class="value">${fmt(m.fulfilled_orders)}</div>
          <div class="sub">Fulfillment Rate: ${pct(m.fulfillment_rate)}</div>
        </div>
        <div class="card red">
          <div class="label">Canceled</div>
          <div class="value">${fmt(m.canceled_orders)}</div>
          <div class="sub">${pct(m.canceled_orders / m.total_orders * 100)} cancel rate</div>
        </div>
        <div class="card blue">
          <div class="label">Unique Customers</div>
          <div class="value">${fmt(m.unique_customers)}</div>
          <div class="sub">Status: <span class="tag ${m.is_active ? 'green':'red'}">${m.is_active ? 'Active':'Inactive'}</span></div>
        </div>
      </div>

      <div class="grid2">
        <div class="section">
          <h2>Monthly Order Trend</h2>
          <div class="chart">
            ${monthly.slice(-12).map(r => `
              <div class="bar-col">
                <div class="b" style="height:${Math.round(parseInt(r.orders)/maxOrders*70)}px" title="${r.orders} orders"></div>
                <div class="m">${r.month}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="section">
          <h2>Performance Summary</h2>
          <table>
            <tr><td style="color:#888">Payment Rate</td><td>
              <div class="bar-wrap">
                <div class="bar-bg"><div class="bar" style="width:${m.payment_rate}%"></div></div>
                <span>${pct(m.payment_rate)}</span>
              </div>
            </td></tr>
            <tr><td style="color:#888">Fulfillment Rate</td><td>
              <div class="bar-wrap">
                <div class="bar-bg"><div class="bar" style="width:${m.fulfillment_rate}%;background:#4caf50"></div></div>
                <span>${pct(m.fulfillment_rate)}</span>
              </div>
            </td></tr>
            <tr><td style="color:#888">Cancel Rate</td><td>
              <div class="bar-wrap">
                <div class="bar-bg"><div class="bar" style="width:${(m.canceled_orders/m.total_orders*100).toFixed(1)}%;background:#f44336"></div></div>
                <span>${pct(m.canceled_orders/m.total_orders*100)}</span>
              </div>
            </td></tr>
          </table>
        </div>
      </div>

      <div class="section">
        <h2>Top Products by Quantity</h2>
        <table>
          <thead><tr><th>#</th><th>Product</th><th>Total Qty</th><th>Share</th></tr></thead>
          <tbody>
            ${products.map((p,i) => `
              <tr>
                <td style="color:#666">${i+1}</td>
                <td>${p.title}</td>
                <td>${fmt(p.total_qty)}</td>
                <td>
                  <div class="bar-wrap">
                    <div class="bar-bg"><div class="bar" style="width:${Math.round(p.total_qty/products[0].total_qty*100)}%"></div></div>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  fetchData();
  setInterval(fetchData, 30000);
</script>
</body>
</html>
